<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebWeavr</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">

    <header>
      <h1>WebWeavr</h1>
      <p class="tagline">Passive Web Surface Analysis</p>
    </header>

    <div class="search-bar">
      <input type="text" id="domain-input" placeholder="example.com" autocomplete="off" spellcheck="false" />
      <button id="scan-btn">Scan</button>
    </div>

    <p class="disclaimer">Passive only — No Packets Sent to Target</p>

    <div id="progress" class="progress hidden">
      <div class="progress-bar"><div id="progress-fill"></div></div>
      <p id="progress-label"></p>
    </div>

    <div id="results"></div>

  </div>
  <script src="/js/app.js"></script>
</body>
</html>
